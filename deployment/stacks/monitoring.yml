services:
  otel-collector:
    profiles:
      - monitoring
    image: otel/opentelemetry-collector-contrib:latest
    user: "0:0" # root access to grant access to the Docker socket
    command: [ "--config=/etc/otelcol/config.yaml" ]
    container_name: otel-collector
    volumes:
      - ../otel-collector/otel-collector-config.yml:/etc/otelcol/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro # Necessary for receiving docker stats
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP http receiver
      - "8889:8889" # Prometheus exporter metrics
    networks:
      - realworld-network

  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--web.enable-remote-write-receiver' # Required if we want to send k6 results here
    ports:
      - "9090:9090"
    networks:
      - realworld-network

  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "4000:3000" # 3000 is reserved for frontend applications, therefore expose 4000 instead
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks:
      - realworld-network

networks:
  realworld-network:
    name: realworld-network
