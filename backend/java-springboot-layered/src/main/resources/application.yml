server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: "jdbc:h2:file:@project.basedir@/realworld;DB_CLOSE_DELAY=-1"
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    default-property-inclusion: NON_NULL

realworld:
  auth:
    header: Authorization
    prefix: "Token "
    secret: ${JWT_SECRET:a-very-long-and-secure-random-secret-key-for-dev-12345}
    token-expiration-msec: 3600000
  pagination:
    default-limit: 20

logging:
  level:
    root: INFO
    com.sakrafux.realworld: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
  file:
    name: "@project.basedir@/realworld.log"
  structured:
    format:
      file: ecs # The JSON format applies *only* to the file
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'}){faint} %clr(%5p) %clr([%X{traceId:-}]){yellow} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"