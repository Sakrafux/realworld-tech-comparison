spring:
  datasource:
    # Use in-memory database for tests to ensure speed and isolation
    url: jdbc:h2:mem:realworld_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      # Automatically create/drop the schema for each test run
      ddl-auto: create-drop
    show-sql: false

realworld:
  auth:
    header: Authorization
    prefix: "Token "
    secret: ${JWT_SECRET:feNiAMDB8g1bMy7AvcKdYAEi++SpBdkrgM0ug6NPII4=}
    token-expiration-msec: 3600000
  pagination:
    default-limit: 20
  cors:
    # Default to localhost for dev, but allow overriding via environment variable
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# Keep logging quiet during tests except for our code
logging:
  level:
    root: WARN
    com.sakrafux.realworld: DEBUG
    org.springframework.web: INFO
